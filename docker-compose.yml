services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: chatbot_chroma
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: chatbot_backend
    ports:
      - "3001:3001"
    environment:
      - CHROMA_URL=http://chromadb:8000
    # Use native environment variables from your Mac
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - chromadb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: chatbot_frontend
    ports:
      - "5173:5173"
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
