    <style>
      .ethereal-stage {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse 80% 60% at 50% -10%, rgba(89, 231, 252, 0.07), transparent 55%),
          radial-gradient(circle at 18% 22%, rgba(52, 61, 150, 0.18), transparent 42%),
          radial-gradient(circle at 82% 78%, rgba(89, 231, 252, 0.06), transparent 45%),
          repeating-radial-gradient(circle at 50% 120%, transparent 0, transparent 48px, rgba(255, 255, 255, 0.012) 48px, rgba(255, 255, 255, 0.012) 49px);
      }
      .ethereal-ambient {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        pointer-events: none;
        opacity: 0.9;
      }
      .ethereal-ambient--a {
        top: 18%;
        left: 12%;
        width: min(400px, 70vw);
        height: min(400px, 70vw);
        background: rgba(89, 231, 252, 0.06);
      }
      .ethereal-ambient--b {
        bottom: 16%;
        right: 8%;
        width: min(360px, 65vw);
        height: min(360px, 65vw);
        background: rgba(52, 61, 150, 0.12);
      }
      .ethereal-orb {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
        background: radial-gradient(circle at 30% 30%, var(--color-primary), transparent 70%);
        box-shadow: 0 0 14px rgba(89, 231, 252, 0.55);
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(89, 231, 252, 0.12);
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="font-body text-on-surface bg-background min-h-screen selection:bg-primary/30">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
